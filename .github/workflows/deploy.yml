name: Build, Push y Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker Image y Push a Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/formativa-cloud:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/formativa-cloud:${{ github.sha }}

  deploy-ec2:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH a EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # detener y eliminar el contenedor anterior si existe
            docker stop formativa-cloud || true
            docker rm formativa-cloud || true

            # descargar la ultima imagen
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/formativa-cloud:latest

            # levantar el contenedor con las variables de entorno y el wallet montado
            docker run -d \
              --name formativa-cloud \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /opt/oracle/wallet:/app/wallet \
              -e DB_TNS_NAME=${{ secrets.DB_TNS_NAME }} \
              -e WALLET_PATH=/app/wallet \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/formativa-cloud:latest
