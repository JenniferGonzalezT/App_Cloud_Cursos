# =============================================================================
# WORKFLOW DE INTEGRACIÓN Y DESPLIEGUE CONTINUO (CI/CD)
# Proyecto: Despliegue en AWS EC2 con Base de Datos Oracle Cloud (Wallet ATP)
# =============================================================================

name: Build and Push Docker Image

# El pipeline se ejecutará automáticamente cada vez que se haga un 'push' o 'pull request'
# hacia la rama principal 'main'.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    # Se utiliza un entorno virtual de Ubuntu actualizado para compilar y construir
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------------------------
      # PASO 1: Descargar el código del repositorio en la máquina virtual de GitHub
      # -------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # -------------------------------------------------------------------------
      # PASO 2: Autenticarse en Docker Hub
      # Usa los secretos guardados en GitHub para iniciar sesión de forma segura
      # -------------------------------------------------------------------------
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------------------------------------------------------
      # PASO 3: Construir la imagen de Docker usando el Dockerfile del proyecto
      # Compila la app con Maven (Etapa 1) y empaqueta el JAR ligero (Etapa 2)
      # -------------------------------------------------------------------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # -------------------------------------------------------------------------
      # PASO 4: Subir (Push) la imagen recién creada a la cuenta de Docker Hub
      # Esto hace que la imagen quede disponible públicamente (o privada) en la nube
      # -------------------------------------------------------------------------
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # -------------------------------------------------------------------------
      # PASO 5: Configurar credenciales temporales de AWS
      # Es vital incluir 'aws-session-token' porque en AWS Academy las credenciales rotan
      # -------------------------------------------------------------------------
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # -------------------------------------------------------------------------
      # PASO 5.5: Inyectar la Llave SSH Privada (.pem) en el runner de GitHub
      # Permite al pipeline simular la terminal Git Bash y conectarse a la EC2
      # -------------------------------------------------------------------------
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # -------------------------------------------------------------------------
      # PASO 6: Conexión remota por SSH a la EC2 y Despliegue de la Aplicación
      # -------------------------------------------------------------------------
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            
            # 1. Autenticar la máquina EC2 en DockerHub para poder descargar la imagen
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # 2. Descargar (Pull) la versión más reciente de la imagen que subimos en el Paso 4
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
            
            # 3. Limpieza preventiva: Si hay un contenedor corriendo con el mismo nombre, lo detiene y elimina
            docker stop my-app || true && docker rm my-app || true
            
            # 4. Lanzamiento del Contenedor (Docker Run) con amarre integral a la Base de Datos y AWS S3:
            #    -p 8080:8080                      -> Expone el puerto de la aplicación.
            #    -e DB_TNS_NAME                    -> El alias de la BD de los secretos (ej: bdcloud_high).
            #    -e DB_USERNAME                    -> Usuario administrador (ej: ADMIN).
            #    -e DB_PASSWORD                    -> Contraseña de Oracle Cloud.
            #    -e WALLET_PATH=/app/wallet        -> Le dice a Spring Boot dónde leer el Wallet ADENTRO del contenedor.
            #    -v /opt/oracle/wallet:/app/wallet -> MAPEADO CLAVE: Vincula la carpeta física de la EC2 con el contenedor.
            #    -e AWS_ACCESS_KEY_ID              -> Pasa la llave de acceso de AWS Academy a la aplicación.
            #    -e AWS_SECRET_ACCESS_KEY          -> Pasa la llave secreta de AWS Academy a la aplicación.
            #    -e AWS_SESSION_TOKEN              -> Pasa el token de sesión dinámico requerido por entornos académicos.
            docker run -d --name my-app \
              -p 8080:8080 \
              -e DB_TNS_NAME=${{ secrets.DB_TNS_NAME }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e WALLET_PATH=/app/wallet \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -v /opt/oracle/wallet:/app/wallet \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF
